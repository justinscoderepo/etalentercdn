<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Winner Podium Badge Card</title>
</head>
<body style="margin:0; padding:0; background:#111; display:flex; align-items:center; justify-content:center; min-height:100vh;">

<div id="result-card-grouped0"
     style="position:relative; display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
            padding:0; overflow:hidden;
            width:886px; height:498px;
            background-image:url('https://etalenter.com/wp-content/uploads/2025/04/bgsamples1.png');
            background-size:cover; background-position:center; background-repeat:no-repeat;">

  <!-- â”€â”€ Header: banner + title â”€â”€ -->
  <div style="display:flex; flex-direction:column; align-items:center; width:100%;">

    <!-- Event logo -->
    <div style="width:100%; display:flex; justify-content:center; align-items:center; margin-top:8px;">
      <img src="https://justinscoderepo.github.io/etalentercdn/Content/Images/ealenterlogo.png" alt="Event Logo"
           style="max-height:55px; max-width:70%; object-fit:contain; filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5));" />
    </div>

    <!-- Banner strip -->
    <div style="width:100%; height:150px; margin-top:6px;
          background-size:cover; background-position:center; background-repeat:no-repeat;
          background-image:url('https://etalenterfiles2.blob.core.windows.net/photos/292/63476_639129189893248980_5bcbcc5c-e63a-4fca-8df2-4a8f3fb3d095.jpg?sv=2026-02-06&se=2126-04-27T18%3A36%3A29Z&sr=b&sp=r&sig=RuPflKv5wVP4EyiIdAxDZXZJlmaP%2Fuo3qMEiTFM9Kdg%3D');">
    </div>

    <!-- Title bar -->
    <div style="width:100%; background-color:rgba(11,11,11,0.5); padding:6px 0;">
      <div style="font-family:'Sanchez',Georgia,serif; font-size:28px; font-weight:700; text-transform:uppercase;
                  padding:0 20px; margin:0; text-align:center;
                  background:linear-gradient(135deg,#f6d365 0%,#fda085 100%);
                  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
                  background-clip:text; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5));">
        {{CompetitionTitle}}
      </div>
    </div>
  </div>

  <!-- â”€â”€ Winners row: 2nd Â· 1st Â· 3rd (podium-step heights) â”€â”€ -->
  <div style="display:flex; flex-direction:row; align-items:stretch; justify-content:center;
              width:100%; padding:0 24px 0; box-sizing:border-box; gap:32px; flex:1; min-height:0;">

    <!-- 2nd Place â€” medium step -->
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; min-width:0;">

      <!-- Prize badge ABOVE photo -->
       <img src="https://justinscoderepo.github.io/etalentercdn/Content/Images/result-card/2002.png"
         alt="Second Prize"
         style="width:200px; margin-bottom:-16px; position:relative; z-index:2; filter:drop-shadow(0 4px 12px rgba(0,0,0,0.7));" />

      <!-- Photo -->
      <div style="width:100%; max-width:170px; aspect-ratio:9/10; border-radius:14px; position:relative; z-index:1;
          border:4px solid #fff;
          box-shadow:0 0 0 4px #9e9e9e, 0 0 0 8px rgba(168,168,168,0.35), 0 10px 28px rgba(0,0,0,0.55);
          background-color:#fff; background-size:cover; background-position:center; background-repeat:no-repeat;
          background-image:url('{{Winner2Photo}}'), url('https://justinscoderepo.github.io/etalentercdn/Content/Images/userIcon.png')">
      </div>

      <!-- Name block -->
      <div style="width:100%; background:linear-gradient(180deg,#a8a8a8,#6e6e6e); padding:14px 4px 18px;
                  border-radius:0 0 12px 12px; text-align:center;
                  border:2.5px solid #fff; border-top:none;
                  box-shadow:0 6px 16px rgba(0,0,0,0.45);">
        <div style="font-family:'Sanchez',Georgia,serif; font-size:19px; font-weight:700;
                    text-transform:uppercase; color:#fff; white-space:nowrap;
                    overflow:hidden; text-overflow:ellipsis; padding:0 4px;">
          {{Winner2Name}}
        </div>
        <div style="font-size:13px; color:rgba(255,255,255,0.90); margin-top:2px;">{{Winner2SubLabel}}</div>
      </div>
    </div>

    <!-- 1st Place â€” tallest step -->
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; min-width:0;">

      <!-- Prize badge ABOVE photo -->
       <img src="https://justinscoderepo.github.io/etalentercdn/Content/Images/result-card/2001.png"
         alt="First Prize"
         style="width:240px; margin-bottom:-18px; position:relative; z-index:2; filter:drop-shadow(0 6px 16px rgba(0,0,0,0.8));" />

      <!-- Photo -->
      <div style="width:100%; max-width:200px; aspect-ratio:9/10; border-radius:16px; position:relative; z-index:1;
          border:5px solid #fff;
          box-shadow:0 0 0 5px #c8972a, 0 0 0 10px rgba(246,211,101,0.4), 0 14px 36px rgba(0,0,0,0.7);
          background-color:#fff; background-size:cover; background-position:center; background-repeat:no-repeat;
          background-image:url('{{Winner1Photo}}'), url('https://justinscoderepo.github.io/etalentercdn/Content/Images/userIcon.png')">
      </div>

      <!-- Name block -->
      <div style="width:100%; background:linear-gradient(180deg,#f6d365,#c8972a); padding:18px 4px 22px;
                  border-radius:0 0 14px 14px; text-align:center;
                  border:3px solid #fff; border-top:none;
                  box-shadow:0 8px 22px rgba(0,0,0,0.55);">
        <div style="font-family:'Sanchez',Georgia,serif; font-size:22px; font-weight:700;
                    text-transform:uppercase; color:#fff; white-space:nowrap;
                    overflow:hidden; text-overflow:ellipsis; padding:0 4px;
                    text-shadow:0 1px 3px rgba(0,0,0,0.5);">
          {{Winner1Name}}
        </div>
        <div style="font-size:14px; color:rgba(255,255,255,0.97); margin-top:2px;">{{Winner1SubLabel}}</div>
      </div>
    </div>

    <!-- 3rd Place â€” shortest step -->
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; min-width:0;">

      <!-- Prize badge ABOVE photo -->
       <img src="https://justinscoderepo.github.io/etalentercdn/Content/Images/result-card/2003.png"
         alt="Third Prize"
         style="width:180px; margin-bottom:-14px; position:relative; z-index:2; filter:drop-shadow(0 4px 12px rgba(0,0,0,0.7));" />

      <!-- Photo -->
      <div style="width:100%; max-width:160px; aspect-ratio:9/10; border-radius:13px; position:relative; z-index:1;
          border:4px solid #fff;
          box-shadow:0 0 0 4px #b07040, 0 0 0 8px rgba(200,133,90,0.35), 0 10px 28px rgba(0,0,0,0.55);
          background-color:#fff; background-size:cover; background-position:center; background-repeat:no-repeat;
          background-image:url('{{Winner3Photo}}'), url('https://justinscoderepo.github.io/etalentercdn/Content/Images/userIcon.png')">
      </div>

      <!-- Name block -->
      <div style="width:100%; background:linear-gradient(180deg,#c8855a,#8b4c2a); padding:12px 4px 16px;
                  border-radius:0 0 11px 11px; text-align:center;
                  border:2.5px solid #fff; border-top:none;
                  box-shadow:0 6px 16px rgba(0,0,0,0.45);">
        <div style="font-family:'Sanchez',Georgia,serif; font-size:17px; font-weight:700;
                    text-transform:uppercase; color:#fff; white-space:nowrap;
                    overflow:hidden; text-overflow:ellipsis; padding:0 4px;">
          {{Winner3Name}}
        </div>
        <div style="font-size:13px; color:rgba(255,255,255,0.90); margin-top:2px;">{{Winner3SubLabel}}</div>
      </div>
    </div>

  </div>

  <!-- â”€â”€ eTalenter logo watermark â”€â”€ -->
  <img alt="Etalenter"
       style="position:absolute; right:4px; bottom:4px; width:64px;"
       src="https://i0.wp.com/etalenter.com/wp-content/uploads/2019/07/cropped-cropped-E_T_LOGO_HEADER_WHITE.png" />

</div>

</body>
</html>
